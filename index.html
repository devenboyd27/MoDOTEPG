<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>MoDOT Engineering Policy Guide</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#001529;
  --blue2:#002d54;
  --blue3:#1a4a7a;
  --gold:#e8a020;
  --text:#1a1a1a;
  --text2:#555;
  --text3:#888;
  --border:#e2e2e2;
  --bg:#f4f4f6;
  --card:#ffffff;
  --radius:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --text:#f0f0f0;--text2:#bbb;--text3:#777;
  --border:#2a2a2a;--bg:#0d0d0d;--card:#1a1a1a;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* STATUS BAR SPACER */
.status-space{height:var(--safe-top);background:var(--blue);}

/* HEADER */
.header{background:var(--blue);padding:14px 16px 16px;flex-shrink:0;}
.header-row{display:flex;align-items:center;gap:12px;}
.logo{width:42px;height:42px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.logo svg{width:38px;height:38px;}
.header-title{color:white;font-size:15px;font-weight:600;letter-spacing:-0.2px;line-height:1.3;}
.header-sub{color:rgba(255,255,255,0.55);font-size:11px;margin-top:2px;}

/* SEARCH BAR (shown on search tab only) */
.search-wrap{padding:10px 16px 0;background:var(--blue);}
.search-inner{background:rgba(255,255,255,0.13);border-radius:10px;display:flex;align-items:center;padding:0 12px;gap:8px;}
.search-inner input{background:none;border:none;outline:none;color:white;font-size:16px;padding:10px 0;flex:1;}
.search-inner input::placeholder{color:rgba(255,255,255,0.5);}
.search-inner .clr{background:none;border:none;color:rgba(255,255,255,0.6);font-size:17px;cursor:pointer;padding:4px;line-height:1;display:none;}

/* SCROLLABLE CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* BOTTOM TAB BAR */
.tabbar{background:var(--card);border-top:0.5px solid var(--border);display:flex;padding-bottom:var(--safe-bot);flex-shrink:0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;color:var(--text3);font-size:10px;gap:3px;border:none;background:none;}
.tab i{font-size:22px;line-height:1;}
.tab.active{color:var(--blue3);}
@media(prefers-color-scheme:dark){.tab.active{color:#4a8fc4;}}

/* VIEWS */
.view{display:none;}
.view.active{display:block;}

/* HOME */
.home-hero{background:var(--blue);padding:0 16px 20px;}
.home-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;padding:16px;}
.home-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:16px 14px 14px;cursor:pointer;display:flex;flex-direction:column;gap:8px;}
.home-card:active{opacity:0.7;}
.home-card-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.home-card-name{font-size:14px;font-weight:500;line-height:1.3;}
.home-card-desc{font-size:11px;color:var(--text3);line-height:1.4;}
.section-label{padding:8px 16px 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);}
.update-row{background:var(--card);border-bottom:0.5px solid var(--border);padding:13px 16px;cursor:pointer;text-decoration:none;color:inherit;display:block;}
.update-row:active{opacity:0.7;}
.update-row:first-of-type{border-top:0.5px solid var(--border);}
.update-title{font-size:14px;font-weight:500;line-height:1.35;color:var(--text);}
.update-meta{font-size:12px;color:var(--text3);margin-top:3px;}
.update-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;margin-right:6px;background:#e8f4ff;color:#0c447c;}
@media(prefers-color-scheme:dark){.update-badge{background:#0d2035;color:#6aadd8;}}
.loading-row{padding:20px 16px;text-align:center;color:var(--text3);font-size:14px;}

/* BOOKMARKS */
.bookmark-empty{padding:60px 24px;text-align:center;color:var(--text3);}
.bookmark-empty i{font-size:40px;display:block;margin-bottom:12px;color:var(--border);}
.bm-row{background:var(--card);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;}
.bm-row:first-of-type{border-top:0.5px solid var(--border);}
.bm-row:active{opacity:0.7;}
.bm-num{font-size:11px;font-weight:600;color:var(--blue3);background:#e6f1fb;padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;}
@media(prefers-color-scheme:dark){.bm-num{background:#0d2035;color:#6aadd8;}}
.bm-name{flex:1;font-size:15px;line-height:1.3;}
.bm-del{background:none;border:none;color:var(--text3);font-size:20px;padding:4px;cursor:pointer;flex-shrink:0;}

/* SEARCH */
.search-hint{padding:52px 24px;text-align:center;color:var(--text3);font-size:14px;}
.search-hint i{font-size:38px;display:block;margin-bottom:10px;color:var(--border);}
.result-row{background:var(--card);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;padding:13px 16px;text-decoration:none;color:inherit;}
.result-row:first-of-type{border-top:0.5px solid var(--border);}
.result-row:active{opacity:0.7;}
.result-num{font-size:11px;font-weight:600;color:var(--blue3);background:#e6f1fb;padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:2px;}
@media(prefers-color-scheme:dark){.result-num{background:#0d2035;color:#6aadd8;}}
.result-info{flex:1;}
.result-info .rt{font-size:15px;font-weight:500;line-height:1.3;}
.result-info .rs{font-size:12px;color:var(--text3);margin-top:2px;}
.result-info mark{background:#fff3b0;color:var(--text);border-radius:2px;padding:0 1px;}
@media(prefers-color-scheme:dark){.result-info mark{background:#4a3a00;color:#f0f0f0;}}
.no-results{padding:40px 24px;text-align:center;color:var(--text3);font-size:14px;}
.no-results a{color:var(--blue3);text-decoration:none;display:block;margin-top:10px;}
@media(prefers-color-scheme:dark){.no-results a{color:#6aadd8;}}

/* BROWSE */
.browse-back{background:var(--card);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:6px;padding:13px 16px;cursor:pointer;color:var(--blue3);font-size:15px;}
@media(prefers-color-scheme:dark){.browse-back{color:#6aadd8;}}
.browse-back:active{opacity:0.7;}
.sec-row{background:var(--card);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;}
.sec-row:first-of-type{border-top:0.5px solid var(--border);}
.sec-row:active{opacity:0.7;}
.sec-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sec-icon i{font-size:20px;}
.sec-info{flex:1;}
.sec-info .sn{font-size:15px;font-weight:500;}
.sec-info .sc{font-size:12px;color:var(--text3);margin-top:1px;}
.sec-chev{color:var(--text3);font-size:18px;}
.art-row{background:var(--card);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;padding:13px 16px;text-decoration:none;color:inherit;}
.art-row:first-of-type{border-top:0.5px solid var(--border);}
.art-row:active{opacity:0.7;}
.art-num{font-size:12px;font-weight:600;color:var(--blue3);width:48px;flex-shrink:0;}
@media(prefers-color-scheme:dark){.art-num{color:#6aadd8;}}
.art-name{flex:1;font-size:15px;line-height:1.3;}
.art-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.art-bm{background:none;border:none;color:var(--text3);font-size:18px;padding:6px;cursor:pointer;}
.art-bm.saved{color:var(--gold);}
.art-go{color:var(--text3);font-size:18px;}

/* LINKS */
.link-row{background:var(--card);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;padding:13px 16px;text-decoration:none;color:inherit;}
.link-row:first-of-type{border-top:0.5px solid var(--border);}
.link-row:active{opacity:0.7;}
.link-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.link-icon i{font-size:18px;}
.link-info{flex:1;}
.link-info .ln{font-size:15px;font-weight:500;}
.link-info .ls{font-size:12px;color:var(--text3);margin-top:1px;}
.link-ext{color:var(--text3);font-size:14px;}
</style>

function goTab(t){
  currentTab = t;
  TABS.forEach(id=>{
    document.getElementById('view-'+id).classList.toggle('active',id===t);
    document.getElementById('tab-'+id).classList.toggle('active',id===t);

  if(t==='bookmarks') renderBookmarks();
  if(t==='links') renderLinks();
  if(t==='search') document.getElementById('searchInput').focus();

/* UPDATES */
async function loadUpdates(){
  const el = document.getElementById('updatesContainer');
  try{
    const res = await fetch('https://epg.modot.org/api.php?action=query&titles=Recent_Policy_Changes_in_the_EPG&prop=revisions&rvprop=content&format=json&origin=*');
    const data = await res.json();
    const pages = data.query.pages;
    const page = pages[Object.keys(pages)[0]];
    const wikitext = page.revisions[0]['*'];
    const items = [];
    const lines = wikitext.split('\n');
    for(const line of lines){
      if(items.length >= 8) break;
      const m = line.match(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/);
      if(m && line.trim().startsWith('*')){
        const title = m[2]||m[1];
        const url = m[1];
        const rest = line.replace(/\[\[.*?\]\]/g,'').replace(/[*']/g,'').trim();
        const dateM = line.match(/\b(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{1,2},?\s+\d{4}/i);
        items.push({title,url,note:rest.slice(0,80),date:dateM?dateM[0]:''});
      }
    }
    if(items.length===0) throw new Error('no items');
    el.innerHTML = items.map(i=>`
      <a class="update-row" href="${EPG}${encodeURIComponent(i.url)}" target="_blank">
        <div class="update-title">${i.title}</div>
        <div class="update-meta">${i.date?'<span class="update-badge">'+i.date+'</span>':''}${i.note||'View article'}</div>
      </a>`).join('');
  }catch(e){
    el.innerHTML = `<a class="update-row" href="${EPG}Recent_Policy_Changes_in_the_EPG" target="_blank">
      <div class="update-title">View recent policy changes</div>
      <div class="update-meta">Opens epg.modot.org</div>
    </a>`;
  }
}

/* SEARCH */
document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.trim();
  document.getElementById('searchClr').style.display=q?'inline':'none';
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>runSearch(q),180);
});
document.getElementById('searchClr').addEventListener('click',function(){
  document.getElementById('searchInput').value='';
  this.style.display='none';
  runSearch('');
});

function runSearch(q){
  const res=document.getElementById('searchResults');
  const hint=document.getElementById('searchHint');
  if(!q){res.innerHTML='';hint.style.display='block';return;}
  hint.style.display='none';
  const lo=q.toLowerCase();
  const matches=[];
  SECTIONS.forEach(s=>{
    s.articles.forEach(a=>{
      const score=a.num.startsWith(lo)?3:a.name.toLowerCase().includes(lo)?2:a.num.toLowerCase().includes(lo)?2:s.name.toLowerCase().includes(lo)?1:0;
      if(score>0) matches.push({...a,sname:s.name,score});
    });
  });
  matches.sort((a,b)=>b.score-a.score);
  const hl=(t)=>t.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
  if(!matches.length){
    res.innerHTML=`<div class="no-results">No matches for "<strong>${q}</strong>"<a href="https://epg.modot.org/index.php?search=${encodeURIComponent(q)}" target="_blank">Search full EPG on web →</a></div>`;
    return;
  }
  res.innerHTML=matches.slice(0,25).map(m=>{
    const saved=bookmarks.some(b=>b.num===m.num);
    return `<a class="result-row" href="${EPG}${encodeURIComponent(m.num)}" target="_blank">
      <span class="result-num">${m.num}</span>
      <div class="result-info"><div class="rt">${hl(m.name)}</div><div class="rs">${m.sname}</div></div>
    </a>`;
  }).join('')+`<a class="result-row" href="https://epg.modot.org/index.php?search=${encodeURIComponent(q)}" target="_blank" style="margin-top:4px;border-top:1px solid var(--border);">
    <span class="result-num" style="background:var(--blue2);color:white;">EPG</span>
    <div class="result-info"><div class="rt">Search full EPG for "${q}"</div><div class="rs">Opens epg.modot.org</div></div>
  </a>`;
}

/* BROWSE */
function renderBrowseMain(){
  const el=document.getElementById('browseMain');
  if(el.dataset.built) return;
  el.dataset.built='1';
  el.innerHTML=`<div style="height:8px;"></div>`+SECTIONS.map(s=>`
    <div class="sec-row" onclick="openSection('${s.num}')">
      <div class="sec-icon" style="background:${s.bg};"><i class="ti ${s.icon}" style="color:${s.ic};" aria-hidden="true"></i></div>
      <div class="sec-info"><div class="sn">${s.num} — ${s.name}</div><div class="sc">${s.articles.length} articles</div></div>
      <i class="ti ti-chevron-right sec-chev" aria-hidden="true"></i>
    </div>`).join('');
}

function openSection(num){
  const s=SECTIONS.find(x=>x.num===num);
  if(!s) return;
  const sub=document.getElementById('browseSub');
  const main=document.getElementById('browseMain');
  sub.innerHTML=`<div class="browse-back" onclick="closeSection()"><i class="ti ti-chevron-left" aria-hidden="true"></i> Sections</div>
    <div class="section-label">${s.num} — ${s.name}</div>`+
    s.articles.map(a=>{
      const saved=bookmarks.some(b=>b.num===a.num);
      return `<div class="art-row">
        <span class="art-num">${a.num}</span>
        <span class="art-name" style="flex:1;">${a.name}</span>
        <div class="art-actions">
          <button class="art-bm${saved?' saved':''}" onclick="toggleBm('${a.num}','${a.name.replace(/'/g,"\\'")}',this)" aria-label="${saved?'Remove bookmark':'Bookmark'}"><i class="ti ${saved?'ti-bookmark-filled':'ti-bookmark'}" aria-hidden="true"></i></button>
          <a href="${EPG}${encodeURIComponent(a.num)}" target="_blank" class="art-go" aria-label="Open article"><i class="ti ti-external-link" aria-hidden="true"></i></a>
        </div>
      </div>`;
    }).join('')+
    `<a class="art-row" href="${EPG}Category:${s.num}_${s.name.toUpperCase().replace(/\s/g,'_').replace(/[^A-Z0-9_]/g,'')}" target="_blank" style="border-top:1px solid var(--border);margin-top:4px;">
      <span class="art-num">All</span>
      <span class="art-name">View full section on EPG website</span>
      <i class="ti ti-external-link" style="color:var(--text3);" aria-hidden="true"></i>
    </a>`;
  main.style.display='none';
  sub.style.display='block';
  document.getElementById('mainContent').scrollTop=0;
}

function closeSection(){
  document.getElementById('browseSub').style.display='none';
  document.getElementById('browseMain').style.display='block';
  document.getElementById('mainContent').scrollTop=0;
}

function toggleBm(num,name,btn){
  const idx=bookmarks.findIndex(b=>b.num===num);
  if(idx>=0){
    bookmarks.splice(idx,1);
    btn.classList.remove('saved');
    btn.innerHTML='<i class="ti ti-bookmark" aria-hidden="true"></i>';
    btn.setAttribute('aria-label','Bookmark');
  } else {
    bookmarks.push({num,name});
    btn.classList.add('saved');
    btn.innerHTML='<i class="ti ti-bookmark-filled" aria-hidden="true"></i>';
    btn.setAttribute('aria-label','Remove bookmark');
  }
  saveBookmarks();
}

/* BOOKMARKS */
function renderBookmarks(){
  const el=document.getElementById('bmContainer');
  if(!bookmarks.length){
    el.innerHTML=`<div class="bookmark-empty"><i class="ti ti-bookmark" aria-hidden="true"></i>No bookmarks yet.<br><span style="font-size:13px;margin-top:6px;display:block;">Browse sections and tap the bookmark icon to save articles.</span></div>`;
    return;
  }
  el.innerHTML=`<div style="height:8px;"></div>`+bookmarks.map(b=>`
    <div class="bm-row">
      <span class="bm-num">${b.num}</span>
      <span class="bm-name">${b.name}</span>
      <a href="${EPG}${encodeURIComponent(b.num)}" target="_blank" style="color:var(--text3);font-size:18px;margin-right:4px;"><i class="ti ti-external-link" aria-hidden="true"></i></a>
      <button class="bm-del" onclick="removeBm('${b.num}')" aria-label="Remove bookmark"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`).join('');
}

function removeBm(num){
  bookmarks=bookmarks.filter(b=>b.num!==num);
  saveBookmarks();
  renderBookmarks();
}

/* LINKS */
function renderLinks(){
  const qel=document.getElementById('quickLinksEl');
  const oel=document.getElementById('otherLinksEl');
  if(qel.dataset.built) return;
  qel.dataset.built='1';
  qel.innerHTML=QUICK_LINKS.map(l=>`
    <a class="link-row" href="${EPG}${l.url}" target="_blank">
      <div class="link-icon" style="background:${l.bg};"><i class="ti ${l.icon}" style="color:${l.ic};" aria-hidden="true"></i></div>
      <div class="link-info"><div class="ln">${l.name}</div><div class="ls">${l.desc}</div></div>
      <i class="ti ti-chevron-right link-ext" aria-hidden="true"></i>
    </a>`).join('');
  oel.innerHTML=OTHER_LINKS.map(l=>`
    <a class="link-row" href="${l.url}" target="_blank">
      <div class="link-icon" style="background:${l.bg};"><i class="ti ${l.icon}" style="color:${l.ic};" aria-hidden="true"></i></div>
      <div class="link-info"><div class="ln">${l.name}</div><div class="ls">${l.desc}</div></div>
      <i class="ti ti-external-link link-ext" aria-hidden="true"></i>
    </a>`).join('');
}

loadUpdates();
</script>
</body>
